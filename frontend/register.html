<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Tarombo Digital</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .register-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .register-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .register-logo h2 {
            color: #333;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-logo">
                <h2>🌳 Tarombo Digital</h2>
                <p class="text-muted mb-0">Buat akun baru untuk mengelola silsilah keluarga</p>
            </div>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" class="form-control" id="nama" required
                        placeholder="Nama lengkap Anda">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required
                        placeholder="nama@email.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required
                        placeholder="Minimal 6 karakter" minlength="6">
                </div>
                <div class="mb-3">
                    <label class="form-label">Konfirmasi Password</label>
                    <input type="password" class="form-control" id="passwordConfirm" required
                        placeholder="Ulangi password">
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">
                    Daftar
                </button>
                <div class="text-center">
                    <span class="text-muted">Sudah punya akun?</span>
                    <a href="login.html" class="text-decoration-none">Masuk</a>
                </div>
            </form>

            <div id="registerError" class="alert alert-danger mt-3" style="display: none;"></div>
            <div id="registerSuccess" class="alert alert-success mt-3" style="display: none;"></div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const nama = document.getElementById('nama').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            const submitBtn = this.querySelector('button[type="submit"]');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (password !== passwordConfirm) {
                errorDiv.textContent = 'Password dan konfirmasi password tidak sama';
                errorDiv.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Mendaftar...';

            const result = await API.register({ nama, email, password });

            if (result.success) {
                successDiv.textContent = 'Akun berhasil dibuat! Mengalihkan ke halaman login...';
                successDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } else {
                errorDiv.textContent = result.error?.message || 'Pendaftaran gagal';
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Daftar';
            }
        });
    </script>
</body>

</html>
