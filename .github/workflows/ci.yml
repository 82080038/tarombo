name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  php-syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, intl, json, curl

      - name: Check PHP syntax
        run: |
          find backend/src backend/public -name "*.php" -exec php -l {} \; 2>&1

  phpunit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, intl, json, curl, sqlite3

      - name: Install Composer Dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        working-directory: backend
        run: vendor/bin/phpunit --testsuite Unit

  js-syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JS syntax
        run: |
          for f in frontend/js/*.js; do
            node -c "$f" || exit 1
          done
